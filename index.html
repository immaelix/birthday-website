<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css" />

  </head>

  <body data-theme="calm">

    <div class="theme-bg" aria-hidden="true">
      <span class="theme-orb theme-orb--1"></span>
      <span class="theme-orb theme-orb--2"></span>
      <span class="theme-orb theme-orb--3"></span>
      <div class="theme-grain"></div>
    </div>

    <div class="theme-vignette" aria-hidden="true"></div>



    <audio id="bg-music" loop preload="auto">

      <source src="assets/audio/our-song.mp3" type="audio/mpeg" />

      <source src="assets/audio/our-song.ogg" type="audio/ogg" />

    </audio>



    <button type="button" id="music-toggle" class="music-toggle" aria-label="Play or pause music">

      ♪

    </button>



    <main id="app">

      <section id="intro" class="screen screen--active" data-screen="intro">

        <p class="intro-eyebrow" id="intro-eyebrow"></p>

        <h1 id="intro-title">Happy Birthday</h1>

        <p class="subtitle" id="intro-subtitle">Tap to begin…</p>

        <p class="intro-hint" id="intro-hint"></p>

      </section>



      <section id="memories" class="screen" data-screen="memories" hidden>
        <h2>Us</h2>
        <p class="section-lead" id="memories-lead"></p>
        <div class="carousel-container">
          <button class="carousel-btn carousel-btn-prev" id="carouselPrev">❮</button>
          <div class="carousel" id="gallery"></div>
          <button class="carousel-btn carousel-btn-next" id="carouselNext">❯</button>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
        <button type="button" class="btn-continue" id="to-surprise">Keep going…</button>
      </section>



      <div class="stickers-layer" id="stickers" aria-hidden="true"></div>



      <section id="surprise" class="screen" data-screen="surprise" hidden>
        <h2 id="surprise-title">Okay… now</h2>
        <p class="section-lead section-lead--spicy" id="surprise-lead"></p>
        <video id="surprise-video" class="surprise-video" playsinline muted loop hidden>
          <source src="assets/videos/surprise.mp4" type="video/mp4" />
        </video>
        <button type="button" class="btn-continue" id="to-cake" style="margin-top: 2rem;">Time for cake?</button>
      </section>

      <section id="cake" class="screen" data-screen="cake" hidden>
        <h2>Happy Birthday, My Love! 🎂</h2>
        <p class="section-lead" style="margin-bottom: 2rem;">Make a wish and blow out the candles!</p>
        <div id="cake-container" class="cake-container">
          <div id="cake" class="cake">
            <!-- Add your real cake photo here: assets/images/cake.jpg -->
            <img id="cake-img" src="assets/images/cake.jpg" alt="Birthday Cake" class="cake-img" onerror="this.style.display='none'">
            <div id="candles-container" class="candles-container">
              <div class="candle" data-lit="true">
                <div class="flame"></div>
              </div>
              <div class="candle" data-lit="true">
                <div class="flame"></div>
              </div>
              <div class="candle" data-lit="true">
                <div class="flame"></div>
              </div>
            </div>
          </div>
          <button type="button" class="btn-cut-cake" id="cut-cake" style="display: none;">Cut the Cake 🎉</button>
        </div>
        <div id="confetti-container" class="confetti-container" aria-hidden="true"></div>
        <button type="button" class="btn-continue" id="to-letter" style="margin-top: 2rem; display: none;">Read your letter ❤️</button>
      </section>

      <section id="letter" class="screen" data-screen="letter" hidden>
        <div class="letter-container">
          <div class="letter-paper">
            <div class="letter-header">For My Love,</div>
            <div class="letter-body" id="letter-body">
              <span id="typing-text"></span><span class="cursor">|</span>
            </div>
            <div class="letter-footer">Forever yours,</div>
          </div>
        </div>
      </section>

    </main>



    <script src="script.js"></script>

  </body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday ❤️</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="main-container">
        <!-- Background -->
        <div class="background-layer">
            <img src="assets/images/background.jpg" alt="Red crumpled paper background" class="bg-image" />
        </div>

        <!-- Top Widgets -->
        <div class="top-widgets">
            <div class="youtube-widget-small">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dFMu3ulTd-w?si=AEfdby28bnfcxKgE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            <div class="spotify-widget-small">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/7uv632EkfwYhXoqf8rhYrg?utm_source=generator&theme=0" width="100%" height="100%" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <!-- Letter Cards -->
        <div class="letter-cards-container">
            <div class="letter-card letter-card-a" data-letter="A">
                <img src="assets/images/ALETTER.png" alt="Letter A" class="letter-img" />
            </div>
            <div class="letter-card letter-card-b" data-letter="B">
                <img src="assets/images/B-LETTER.png" alt="Letter B" class="letter-img" />
            </div>
            <div class="letter-card letter-card-c" data-letter="C">
                <img src="assets/images/C-LETTER.png" alt="Letter C" class="letter-img" />
            </div>
            <div class="letter-card letter-card-d" data-letter="D">
                <img src="assets/images/D-LETER.png" alt="Letter D" class="letter-img" />
            </div>
            <div class="letter-card letter-card-e" data-letter="E">
                <img src="assets/images/E-LETTER.png" alt="Letter E" class="letter-img" />
            </div>
        </div>

        <!-- Decorative Elements -->
        <div class="decorative-layer">
            <img src="assets/images/star-image.png" alt="Leopard print star" class="star star-1" />
            <img src="assets/images/star-image.png" alt="Leopard print star" class="star star-2" />
            <img src="assets/images/star-image.png" alt="Leopard print star" class="star star-3" />
            
            <img src="assets/images/bouquet1.png" alt="Bouquet" class="bouquet" />
            
            <img src="assets/images/ENVELOPE.png" alt="Envelope" class="envelope" />
            
            <img src="assets/images/cat-image.png" alt="Cats" class="cats" />
            
            <img src="assets/images/iloveyou-image.png" alt="I love you" class="iloveyou-text" />
            
            <div class="from-text">
                <p>From: Someone</p>
                <p>For you</p>
            </div>
        </div>

        <!-- Bottom Widgets -->
        <div class="bottom-widgets">
            <div class="voice-note-player">
                <button class="play-btn" id="voice-play-btn">▶</button>
                <div class="voice-info">
                    <p class="voice-title">Voice note</p>
                    <p class="voice-subtitle">tap to listen</p>
                </div>
                <div class="waveform">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <span class="voice-duration">0:18</span>
            </div>
        </div>

        <!-- Letter Modal -->
        <div class="letter-modal" id="letter-modal" hidden>
            <div class="modal-content">
                <button class="close-modal" id="close-modal">×</button>
                <div class="modal-text" id="modal-text"></div>
            </div>
        </div>
    </div>

    <!-- Audio for voice note -->
    <audio id="voice-note" preload="auto">
        <source src="assets/audio/voice-note.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
</body>
</html>
